name: Deploy & Build Multiplatform App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: 🚀 Deploy to CloudPanel VPS
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '103.67.244.19'
          username: 'root'
          key: ${{ secrets.VPS }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            # Sync code
            cd /home/nihongo-master
            git pull origin main || true
            
            # Install, compile, and copy APK
            npm install --legacy-peer-deps
            npm run build
            cp /home/nihongo-master/public/nihongo-master.apk /home/nihongo-master/dist/nihongo-master.apk || true
            
            # Restart backend server
            pm2 restart nihongo-master --update-env

  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Get Version and Auto-Increment
        id: get_version
        run: |
          node resolve-version.mjs

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps

      - name: Build SPA for Native App
        run: |
          VITE_API_BASE=https://kuislatihanbahasajepang.web.id npm run build

      - name: Sync Web Assets to Android Project
        run: |
          npx cap sync

      - name: Grant Execute Permission to Gradle Wrapper
        run: |
          chmod +x android/gradlew

      - name: Compile Native Standalone Android APK
        run: |
          cd android && ./gradlew assembleRelease

      - name: List generated files
        if: always()
        run: |
          echo "=== Root directory APK files ==="
          find . -maxdepth 1 -name "*.apk" 2>/dev/null || true
          echo ""
          echo "=== Gradle Android build output directory ==="
          find android/app/build/outputs/apk/ -name "*.apk" 2>/dev/null || true

      - name: Upload Unsigned Android APK Artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nihongo-master-unsigned-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Prepare and Sign Standalone APK
        if: success()
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" ./nihongo-master.apk
            echo "✅ Copied Release APK to: ./nihongo-master.apk"
            
            # Sign the APK with apksigner using the fixed keystore from repository
            echo "🖋️ Signing the APK with apksigner using fixed nihongo-master.keystore..."
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks nihongo-master.keystore --ks-key-alias nihongomasterkey --ks-pass pass:nihongomaster --key-pass pass:nihongomaster ./nihongo-master.apk
            
            # Verify the signature with apksigner to confirm v2/v3 signature schemes are active
            echo "🔍 Verifying the APK signature schemes..."
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose ./nihongo-master.apk
            echo "✅ APK successfully signed and verified with Android v2/v3 signature schemes!"
          else
            echo "❌ No APK found to deploy!"
            exit 1
          fi

      - name: Commit and Push signed APK and updated version to GitHub
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./nihongo-master.apk ./package.json
          
          # Read current version for commit message
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          if git diff --staged --quiet; then
            echo "No changes in APK or package.json to commit."
          else
            git commit -m "chore: auto-update signed APK and bump version to $NEW_VERSION [skip ci]"
            git push origin main
          fi

      - name: Deploy APK to VPS public directory
        if: success()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: '103.67.244.19'
          username: 'root'
          key: ${{ secrets.VPS }}
          port: 22
          source: "./nihongo-master.apk"
          target: "/home/nihongo-master/public"

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ env.APP_VERSION }}"
          name: "Nihongo Master Release v${{ env.APP_VERSION }}"
          body: |
            Aplikasi Nihongo Master - Kuis & Kamus Bahasa Jepang (v${{ env.APP_VERSION }})
            Fitur: Fast Google Login, Google One Tap Auto-Prompt, and PWA Integration.
          files: |
            ./nihongo-master.apk
          token: ${{ secrets.GITHUB_TOKEN }}

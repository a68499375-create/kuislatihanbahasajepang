name: Deploy & Build Multiplatform App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to CloudPanel VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '103.67.244.19'
          username: 'root'
          password: ${{ secrets.VPS_PASSWORD }} # Save Akumuak_01 in GitHub Secrets as VPS_PASSWORD
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            # Sync code
            cd /home/nihongo-master
            git pull origin main || true
            
            # Install & restart
            npm install
            pm2 restart nihongo-master --update-env

  build-android:
    name: 🤖 Build Android APK (PWA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate Android Project from PWA
        run: |
          # Bubblewrap takes the PWA manifest and compiles it to Android APK
          # We generate a default configuration for the build
          mkdir -p android-build
          cd android-build
          bubblewrap init --manifest=https://kuislatihanbahasajepang.web.id/manifest.json --meta=yes
          bubblewrap build --skipSigning

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-master-android-apk
          path: android-build/*.apk

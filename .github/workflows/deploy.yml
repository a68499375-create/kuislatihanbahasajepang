name: Deploy & Build Multiplatform App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: 🚀 Deploy to CloudPanel VPS
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          KEY_STR=$(echo "${{ secrets.VPS }}" | tr -d '\r')
          if [[ "$KEY_STR" == *"BEGIN OPENSSH"* ]]; then
            B64_PART=$(echo "$KEY_STR" | sed 's/-----BEGIN OPENSSH PRIVATE KEY-----//g' | sed 's/-----END OPENSSH PRIVATE KEY-----//g' | tr -d '\n' | tr -d ' ')
            echo "-----BEGIN OPENSSH PRIVATE KEY-----" > ~/.ssh/id_ed25519
            echo "$B64_PART" | fold -w 70 >> ~/.ssh/id_ed25519
            echo "-----END OPENSSH PRIVATE KEY-----" >> ~/.ssh/id_ed25519
          else
            echo "$KEY_STR" > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config

      - name: Deploy and restart server on VPS
        run: |
          ssh root@103.67.244.19 "bash -s" << 'EOF'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            cd /home/nihongo-master
            git pull origin main || true
            npm install --legacy-peer-deps
            npm run build
            cp /home/nihongo-master/public/nihongo-master.apk /home/nihongo-master/dist/nihongo-master.apk || true
            pm2 restart nihongo-master --update-env
          EOF

  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get Version and Auto-Increment
        id: get_version
        run: |
          node resolve-version.mjs

      - name: Set up Java 21 (Pre-installed)
        run: |
          if [ -d "/usr/lib/jvm/temurin-21-jdk-amd64" ]; then
            echo "JAVA_HOME=/usr/lib/jvm/temurin-21-jdk-amd64" >> $GITHUB_ENV
            echo "/usr/lib/jvm/temurin-21-jdk-amd64/bin" >> $GITHUB_PATH
            echo "✅ Configured Temurin Java 21"
          elif [ -d "/usr/lib/jvm/zulu-21-amd64" ]; then
            echo "JAVA_HOME=/usr/lib/jvm/zulu-21-amd64" >> $GITHUB_ENV
            echo "/usr/lib/jvm/zulu-21-amd64/bin" >> $GITHUB_PATH
            echo "✅ Configured Zulu Java 21"
          else
            echo "⚠️ Pre-installed Java 21 not found, trying system default."
            java -version
          fi

      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps

      - name: Build SPA for Native App
        run: |
          VITE_API_BASE=https://kuislatihanbahasajepang.web.id npm run build

      - name: Sync Web Assets to Android Project
        run: |
          npx cap sync

      - name: Grant Execute Permission to Gradle Wrapper
        run: |
          chmod +x android/gradlew

      - name: Compile Native Standalone Android APK
        run: |
          cd android && ./gradlew assembleRelease

      - name: List generated files
        if: always()
        run: |
          echo "=== Root directory APK files ==="
          find . -maxdepth 1 -name "*.apk" 2>/dev/null || true
          echo ""
          echo "=== Gradle Android build output directory ==="
          find android/app/build/outputs/apk/ -name "*.apk" 2>/dev/null || true

      - name: Upload Unsigned Android APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-master-unsigned-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Prepare and Sign Standalone APK
        if: success()
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" ./nihongo-master.apk
            echo "✅ Copied Release APK to: ./nihongo-master.apk"
            
            # Sign the APK with apksigner using the fixed keystore from repository
            echo "🖋️ Signing the APK with apksigner using fixed nihongo-master.keystore..."
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks nihongo-master.keystore --ks-key-alias nihongomasterkey --ks-pass pass:nihongomaster --key-pass pass:nihongomaster ./nihongo-master.apk
            
            # Verify the signature with apksigner to confirm v2/v3 signature schemes are active
            echo "🔍 Verifying the APK signature schemes..."
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose ./nihongo-master.apk
            echo "✅ APK successfully signed and verified with Android v2/v3 signature schemes!"
          else
            echo "❌ No APK found to deploy!"
            exit 1
          fi

      - name: Configure SSH Key for SCP
        if: success()
        run: |
          mkdir -p ~/.ssh
          KEY_STR=$(echo "${{ secrets.VPS }}" | tr -d '\r')
          if [[ "$KEY_STR" == *"BEGIN OPENSSH"* ]]; then
            B64_PART=$(echo "$KEY_STR" | sed 's/-----BEGIN OPENSSH PRIVATE KEY-----//g' | sed 's/-----END OPENSSH PRIVATE KEY-----//g' | tr -d '\n' | tr -d ' ')
            echo "-----BEGIN OPENSSH PRIVATE KEY-----" > ~/.ssh/id_ed25519
            echo "$B64_PART" | fold -w 70 >> ~/.ssh/id_ed25519
            echo "-----END OPENSSH PRIVATE KEY-----" >> ~/.ssh/id_ed25519
          else
            echo "$KEY_STR" > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config

      - name: Deploy APK to VPS public directory
        if: success()
        run: |
          scp ./nihongo-master.apk root@103.67.244.19:/home/nihongo-master/public/nihongo-master.apk

      - name: Commit and Push signed APK and updated version to GitHub
        if: success()
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./nihongo-master.apk ./package.json
          
          # Read current version for commit message
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          if git diff --staged --quiet; then
            echo "No changes in APK or package.json to commit."
          else
            git commit -m "chore: auto-update signed APK and bump version to $NEW_VERSION [skip ci]"
            git push origin main
          fi

      - name: Create GitHub Release
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.APP_VERSION }}" ./nihongo-master.apk \
            --title "Nihongo Master Release v${{ env.APP_VERSION }}" \
            --notes "Aplikasi Nihongo Master - Kuis & Kamus Bahasa Jepang (v${{ env.APP_VERSION }}). Fitur: Fast Google Login, Google One Tap Auto-Prompt, and PWA Integration."

name: Deploy & Build Multiplatform App

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: 🚀 Deploy to CloudPanel VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '103.67.244.19'
          username: 'root'
          key: ${{ secrets.VPS }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            # Sync code
            cd /home/nihongo-master
            git pull origin main || true
            
            # Install, compile, and copy APK
            npm install
            npm run build
            cp /home/nihongo-master/public/nihongo-master.apk /home/nihongo-master/dist/nihongo-master.apk || true
            
            # Restart backend server
            pm2 restart nihongo-master --update-env

  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Android SDK and Bubblewrap
        run: |
          echo "=== DEBUG INFO ==="
          echo "JAVA_HOME is: $JAVA_HOME"
          echo "ANDROID_HOME is: $ANDROID_HOME"
          
          # Fix ownership of Android SDK so runner can write/install packages
          sudo chown -R $USER:$USER $ANDROID_HOME
          
          # Dynamically detect sdkmanager location and create a symlink for Bubblewrap
          SDK_MANAGER=""
          if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            # Bubblewrap often expects the sdkmanager to be in tools/bin/
            if [ ! -d "$ANDROID_HOME/tools" ]; then
              ln -s "$ANDROID_HOME/cmdline-tools/latest" "$ANDROID_HOME/tools"
            fi
          elif [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
            SDK_MANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          else
            SDK_MANAGER="sdkmanager"
          fi
          echo "Found sdkmanager at: $SDK_MANAGER"
          
          # Install required build tools, platform tools and platform 34
          $SDK_MANAGER "build-tools;34.0.0" "platforms;android-34" "platform-tools"
          
          # Accept Android licenses dynamically
          yes | $SDK_MANAGER --licenses || true
          
          # Create Bubblewrap config using dynamic variables
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          
          echo "=== CONFIG.JSON ==="
          cat ~/.bubblewrap/config.json
          echo "==================="

      - name: Update Android Project from Manifest
        run: |
          # Generate/update the Android project files from twa-manifest.json non-interactively
          bubblewrap update --skipVersionUpgrade

      - name: Build Unsigned Android APK
        run: |
          # Build APK with the pre-configured twa-manifest.json
          bubblewrap build --skipSigning

      - name: List generated files
        if: always()
        run: |
          echo "=== Root directory APK/AAB files ==="
          find . -maxdepth 1 -name "*.apk" -o -name "*.aab" | head -20
          echo ""
          echo "=== Gradle output directory ==="
          find . -path "*/build/outputs/*" -name "*.apk" 2>/dev/null | head -20
          echo ""
          echo "=== All APK files anywhere ==="
          find . -name "*.apk" 2>/dev/null | head -20

      - name: Upload Android APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-master-android-apk
          path: |
            ./*.apk
            ./app/build/outputs/**/*.apk
          if-no-files-found: warn

      - name: Prepare and Sign APK for Deployment
        if: success()
        run: |
          # Find any generated release APK and copy it to nihongo-master.apk
          APK_PATH=$(find . -path "*/build/outputs/*" -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" ./nihongo-master.apk
            echo "✅ Copied APK to: ./nihongo-master.apk"
            
            # Generate a debug keystore dynamically
            echo "🔑 Generating debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            
            # Sign the APK with apksigner (which applies v1, v2, v3, and v4 signatures!)
            echo "🖋️ Signing the APK with apksigner for full Android 11+ compatibility (V2/V3 signature)..."
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks debug.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android ./nihongo-master.apk
            
            # Verify the signature with apksigner to confirm v2/v3 signature schemes are active
            echo "🔍 Verifying the APK signature schemes..."
            $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose ./nihongo-master.apk
            echo "✅ APK successfully signed and verified with Android v2/v3 signature schemes!"
          else
            echo "❌ No APK found to deploy!"
            exit 1
          fi

      - name: Deploy APK to VPS public directory
        if: success()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: '103.67.244.19'
          username: 'root'
          key: ${{ secrets.VPS }}
          port: 22
          source: "./nihongo-master.apk"
          target: "/home/nihongo-master/public"

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Nihongo Master Release v1.0.${{ github.run_number }}"
          body: |
            Aplikasi Nihongo Master - Kuis & Kamus Bahasa Jepang
            Fitur: Fast Google Login, Google One Tap Auto-Prompt, and PWA Integration.
          files: |
            ./nihongo-master.apk
          token: ${{ secrets.GITHUB_TOKEN }}

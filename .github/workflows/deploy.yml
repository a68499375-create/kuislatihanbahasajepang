name: Deploy & Build Multiplatform App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to CloudPanel VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '103.67.244.19'
          username: 'root'
          key: ${{ secrets.VPS }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            # Sync code
            cd /home/nihongo-master
            git pull origin main || true
            
            # Install & restart
            npm install
            pm2 restart nihongo-master --update-env

  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap Non-Interactively
        run: |
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "✅ Bubblewrap CLI pre-configured successfully!"

      - name: Build Unsigned Android APK
        run: |
          # Use pre-configured twa-manifest.json to bypass init prompts
          bubblewrap build --skipSigning

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nihongo-master-android-apk
          path: ./*.apk

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet" />
    <title>Nihongo Master - Kuis & Kamus Bahasa Jepang</title>
    <meta name="description" content="Aplikasi belajar bahasa Jepang interaktif dengan kuis, kamus lengkap N5-N1, AI Sensei, dan suara karakter anime! Gratis!" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nihongo Master" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
      <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
      <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <!-- ⛩️ Premium Zenith Nihongo Preloader Splash Screen -->
    <div id="app-preloader" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #140d36 0%, #08041d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    ">
      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: preloader-pulse 2s ease-in-out infinite;
      ">
        <!-- Golden Glowing Torii Gate Chibi Logo -->
        <div style="
          position: relative;
          width: 120px;
          height: 120px;
          border-radius: 32px;
          background: radial-gradient(circle, #1a1645 0%, #0d092d 100%);
          border: 2px solid rgba(245, 158, 11, 0.45);
          box-shadow: 0 0 35px rgba(245, 158, 11, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.05);
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          margin-bottom: 5px;
          user-select: none;
        ">
          <!-- Premium Icon Image -->
          <img src="/icons/icon-192x192.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Zenith Nihongo" />
        </div>
        
        <!-- App Title -->
        <h1 style="
          margin: 0;
          font-family: 'Noto Serif JP', 'Georgia', serif;
          font-weight: 900;
          font-size: 28px;
          letter-spacing: 2px;
          background: linear-gradient(to right, #fbbf24, #f59e0b, #d97706);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        ">ZENITH NIHONGO</h1>
        
        <!-- Subtitle / Status -->
        <p style="
          margin: -8px 0 0 0;
          font-family: 'Noto Sans JP', sans-serif;
          font-size: 11px;
          font-weight: 700;
          color: #94a3b8;
          letter-spacing: 4px;
          text-transform: uppercase;
        ">KUIS & KAMUS BAHASA JEPANG</p>
      </div>

      <!-- Glowing Spinner & Progress -->
      <div style="
        margin-top: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      ">
        <div style="
          width: 32px;
          height: 32px;
          border: 2px solid rgba(245, 158, 11, 0.15);
          border-top: 2px solid #f59e0b;
          border-radius: 50%;
          animation: preloader-spin 0.8s linear infinite;
          box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        "></div>
        
        <span style="
          font-family: 'Noto Sans JP', sans-serif;
          font-size: 11px;
          font-weight: 700;
          color: #f59e0b;
          letter-spacing: 1px;
          opacity: 0.8;
          animation: preloader-fade 1.5s ease-in-out infinite;
        ">Menginisialisasi Sensei AI...</span>
      </div>

      <!-- CSS Animations -->
      <style>
        @keyframes preloader-pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.03); }
        }
        @keyframes preloader-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes preloader-fade {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }
        body {
          margin: 0;
          background-color: #08041d;
        }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('✅ PWA Service Worker registered:', reg.scope))
            .catch((err) => console.log('⚠️ PWA SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
